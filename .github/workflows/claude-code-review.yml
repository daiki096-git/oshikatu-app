name: Claude Code Review

# PRが作成された時、およびPRブランチへpushされるたびに自動レビューを実行する
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          # Claude Pro/Max サブスクのOAuthトークンで認証する（API従量課金なし）
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このPRの差分をレビューしてください。
            リポジトリ直下の CLAUDE.md に記載されたコーディングルール・設計方針に従うこと。

            観点は以下の4つ:
            - バグ（ロジック誤り、境界値、null/undefined、非同期の扱い）
            - 保守性（可読性、命名、重複、MVC構成の維持）
            - セキュリティ（SQLインジェクション、入力バリデーション、認証・認可、機密情報）
            - パフォーマンス（不要なクエリ、N+1、重い処理）

            進め方:
            - `gh pr diff` で差分を取得する
            - 問題のある箇所には mcp__github_inline_comment__create_inline_comment でインラインコメントを付ける
            - 指摘は日本語で、根拠と修正案を簡潔に添える
            - 重大度の高い順に指摘する。問題がなければその旨を伝える
            - 些細なスタイルの好みは指摘しない
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
